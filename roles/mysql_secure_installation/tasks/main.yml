# 1️⃣ Ensure root uses unix_socket authentication
- name: Ensure root uses unix_socket auth
  community.mysql.mysql_user:
    name: root
    host: localhost
    plugin: unix_socket
    login_unix_socket: /var/run/mysqld/mysqld.sock
    check_implicit_admin: yes
    state: present


# 2️⃣ Set root password
- name: Set MySQL root password
  community.mysql.mysql_user:
    name: root
    host: localhost
    password: "{{ mysql_root_password }}"
    login_unix_socket: /var/run/mysqld/mysqld.sock
    check_implicit_admin: yes


# 3️⃣ Remove anonymous users
- name: Remove anonymous users
  community.mysql.mysql_user:
    name: ''
    host_all: yes
    state: absent
    login_user: root
    login_password: "{{ mysql_root_password }}"


# 4️⃣ Allow remote root login (IMPORTANT — you selected N for disallow)
- name: Allow remote root login
  community.mysql.mysql_user:
    name: root
    host: '%'
    password: "{{ mysql_root_password }}"
    priv: "*.*:ALL,GRANT"
    state: present
    login_user: root
    login_password: "{{ mysql_root_password }}"


# 5️⃣ Remove test database
- name: Remove test database
  community.mysql.mysql_db:
    name: test
    state: absent
    login_user: root
    login_password: "{{ mysql_root_password }}"